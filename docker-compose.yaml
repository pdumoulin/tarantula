---
services:

  deploy:
    platform: 'linux/amd64'
    build:
      context: .
      target: app
    ports:
      - "80:5000"
    environment:
      - ENVIRONMENT=prod
      - NUM_WORKERS=6
    env_file:
      - path: ./.env
        required: false
      - path: ./.sentry
        required: false
    volumes:
      - ./logs:/tmp/logs
    restart: always

  dev:
    platform: 'linux/amd64'
    build:
      context: .
      target: dev
    ports:
      - "1986:5000"
      - "5678:5678"
    environment:
      - ENVIRONMENT=dev
      - AUTO_RELOAD=true
      - DEBUGGER=false
      - PYDEVD_DISABLE_FILE_VALIDATION=1
      - STATIC_CACHE_TIME=0
      - NUM_WORKERS=1
    env_file:
      - path: ./.sentry
        required: false
    volumes:
      - ./src:/var/app/src
      - ./static:/var/app/static
      - ./templates:/var/app/templates
    stdin_open: true
    tty: true

  poetry-update:
    platform: 'linux/amd64'
    build:
      context: .
      target: poetry_update
    volumes:
      - ./poetry.lock:/var/app/poetry.lock

  hadolint:
    image: hadolint/hadolint:latest-alpine
    working_dir: /tmp
    volumes:
      - ./Dockerfile:/tmp/Dockerfile
    command: hadolint Dockerfile

  lint-and-test:
    platform: 'linux/amd64'
    build:
      context: .
      target: lint_and_test
    depends_on:
      hadolint:
        condition: service_completed_successfully

  format:
    platform: 'linux/amd64'
    build:
      context: .
      target: format
    volumes:
      - ./src:/var/app/src
